name: deploy-pages

on:
  # Deploy on every push to main…
  push:
    branches: [main]
  # …after the daily `sync` run (its bot commit uses GITHUB_TOKEN, which does
  # NOT trigger the push event above, so the site would otherwise go stale)…
  workflow_run:
    workflows: ["sync"]
    types: [completed]
  # …and allow manual runs.
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight Pages deploy at a time; don't cancel a running one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # When triggered by the sync run, only deploy if that run succeeded.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build from the committed entries.json (no external fetch here, so a
      # docs outage can't break a deploy). The daily `sync` workflow keeps the
      # data fresh; a push from it re-triggers this deploy.
      - name: Build web
        run: pnpm build:web

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
