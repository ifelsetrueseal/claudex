name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - run: pnpm install --frozen-lockfile

      - name: Build universal macOS app (.app + .dmg)
        run: pnpm --filter @claudex/desktop exec tauri build --target universal-apple-darwin

      - name: Collect release assets
        run: |
          mkdir -p release
          cp apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg release/
          cp scripts/install.sh release/
          ls -lh release

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
